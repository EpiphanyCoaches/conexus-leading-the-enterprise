o one leader can see the whole picture alone. The best leadership teams listen across functions and think about the organization as a whole.\n\nAs organizations grow, what worked in the past may not be enough for the future. Great leaders stay curious, challenge assumptions, and pay attention to the stories being told before they become accepted truths.","voiceCode":"en-US-AlloyTurboMultilingualNeural","language":"en","originalResourceId":"ZsftiJiN6WyQMmXmr","ssml":"\u003cspeak \n            xmlns=\"http://www.w3.org/2001/10/synthesis\"\n            xmlns:mstts=\"http://www.w3.org/2001/mstts\"\n            xmlns:emo=\"http://www.w3.org/2009/10/emotionml\" \n            version=\"1.0\" \n            xml:lang=\"en\"\n          >\n            \u003cvoice name=\"en-US-AlloyTurboMultilingualNeural\">In the last session, we explored the idea of seeing the system from the inside versus stepping back to view it from the outside. As leaders, we're often so close to the work that it can be difficult to recognize the patterns and dynamics influencing the organization. Getting \"on the balcony\" helps us gain perspective and make better decisions.\u003c/voice>\u003cvoice name=\"en-US-AlloyTurboMultilingualNeural\">\u003cprosody rate=\"0.9\">It's also important not to personalize every challenge. Many tensions are built into the system itself, and no one leader can see the whole picture alone. The best leadership teams listen across functions and think about the organization as a whole.\u003cbreak time=\"0.5s\"/>As organizations grow, what worked in the past may not be enough for the future. Great leaders stay curious, challenge assumptions, and pay attention to the stories being told before they become accepted truths.\u003c/prosody>\u003c/voice>\n          \u003c/speak>"},"captionData":{"status":"success","captions":[{"text":"In the last session,","startTime":0.009,"finishTime":1.07},{"text":"we explored the idea of seeing the system from the","startTime":1.399,"finishTime":4.05},{"text":"inside versus stepping back to view it from the outside.","startTime":4.05,"finishTime":6.869},{"text":"As leaders,","startTime":7.139,"finishTime":7.8},{"text":"we're often so close to the work that it can be","startTime":7.889,"finishTime":10.279},{"text":"difficult to recognize the patterns and dynamics influencing the organization.","startTime":10.279,"finishTime":14.52},{"text":"Getting on the balcony","startTime":14.81,"finishTime":16.01},{"text":"helps us gain perspective and make better decisions.","startTime":16.25,"finishTime":19.12},{"text":"It's also important not to personalize every challenge.","startTime":19.409,"finishTime":22.76},{"text":"Many tensions are built into the system itself,","startTime":23.17,"finishTime":25.629},{"text":"and no one leader can see the whole picture alone.","startTime":26.239,"finishTime":28.75},{"text":"The best leadership teams listen across functions and","startTime":29.309,"finishTime":32.79},{"text":"think about the organization as a whole.","startTime":32.79,"finishTime":34.889},{"text":"As organizations grow,","startTime":35.79,"finishTime":37.5},{"text":"what worked in the past may not be enough for the future.","startTime":37.709,"finishTime":40.729},{"text":"Great leaders stay curious,","startTime":41.11,"finishTime":42.779},{"text":"challenge assumptions,","startTime":43.13,"finishTime":44.299},{"text":"and pay attention to the stories being told before they become accepted truths.","startTime":44.59,"finishTime":49.15}]}},"RrZHiFHWGLx7aLdwN":{"_id":"RrZHiFHWGLx7aLdwN","_siteID":"g7KiRFsys4vhsx3dA","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":839232,"uploadedFileName":"Alloy-en-TheFirstTeamMindset-6162026.mp3","uploadedFileNameExtension":".mp3","duration":34.925},"dates":{"dateCreated":"2026-06-16T20:32:16.670Z","dateModified":"2026-06-16T20:32:24.245Z"},"users":{"_userCreatorID":"xpAePQ3mCWbJ9zYyH","_userModifierID":"xpAePQ3mCWbJ9zYyH"}},"isBuilt e another.\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"color:#703dd6\">\u003cstrong>Tips for seeing the system:\u003c/strong>\u003c/span>\u003cbr />\n&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"font-size:22.4px\">&bull;&nbsp;&nbsp; &nbsp;\u003cstrong>Get on the balcony -&nbsp;\u003c/strong>Step back and assess the bigger picture.&nbsp;\u003cbr />\n\u003cbr />\n&bull;&nbsp;&nbsp; &nbsp;\u003cstrong>Don&#39;t personalize tension -\u003c/strong> Many challenges are systemic, not individual.&nbsp;\u003cbr />\n\u003cbr />\n&bull;&nbsp;&nbsp; &nbsp;\u003cstrong>Listen across functions -\u003c/strong> No one leader (or department) sees the whole system.&nbsp;\u003cbr />\n\u003cbr />\n&bull;&nbsp;&nbsp; &nbsp;\u003cstrong>Recognize that growth changes the game -\u003c/strong>&nbsp;What worked before may not work next.&nbsp;\u003cbr />\n\u003cbr />\n&bull;&nbsp;&nbsp; &nbsp;\u003cstrong>Challenge assumptions and narratives -&nbsp;\u003c/strong>Surface stories before they become accepted truths.&nbsp;\u003c/span>\u003cbr />\n&nbsp;\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n","identifier":"uYeQ2QvkQQht3aYGt","customStyle":{"verticalAlignment":"top","lineHeight":1.3,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fontColor":"rgba(0,0,0,1)","font":{"size":16,"bold":false,"italic":false,"underline":false},"type":"rectangle","fill":{"type":"color","color":"koantic(light1, 0, 0)"},"padding":{"left":0,"top":0,"bottom":0,"right":0},"textHeading":"normal"},"kind":"overlay","type":"rectangle","entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"SivSTzE2B6LwgdFYD","kind":"group","overlays":[{"x":998,"y":284.8635353031802,"width":164.55918796776425,"height":164.55918796776422,"isRatio from an enterprise perspective.\n\nThird, balance alignment and autonomy. Collaborate up front, then avoid policing one another afterward.\n\nFourth, establish clear guardrails. Handle most decisions efficiently and work through the difficult few together.\n\nFifth, trust laterally and downstream. Empower others to execute and escalate only newly identified risks.\n\nAnd finally, surface tensions early. Healthy tension strengthens execution, while hidden tension can undermine it.\n\nWhen leaders align on decisions and trust one another to execute, the organization can move faster and deliver better results.","jobId":"YSPtX7NFfCY7QXfSA","voiceCodeUsed":"en-US-AlloyTurboMultilingualNeural","featureAdoption":{"isUsingMultipleVoices":false,"isAddingPauses":false,"isAdjustingSpeed":false}}},"heoBS6PG7ZKwKSX3j":{"_id":"heoBS6PG7ZKwKSX3j","data":{"attributes":{"title":"Instructions","template":"resourceSlide","locale":"en","upload":"ApHGqStFz46642C92"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"z6gG2Qohgh5CtGvv5","kind":"group","overlays":[{"customStyle":{"font":{"size":16,"bold":false,"italic":false,"underline":false},"fontColor":"koantic(dark1, 0, 1)","lineHeight":1.4000000000000001,"textAlignment":"center","border":{"color":"#000000","size":0,"left":true,"top":true,"bottom":true,"right":true},"fill":{"color":"rgba(255,255,255,0)","type":"color"},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"textHeading":"heading2","type":"rectangle","padding":{"left":0,"top":0,"bottom":0,"right":0}},"identifier":"bTMkDmZXkLuwwvFLv","width":1118,"height":64.99999999999999,"htmlContent":"\u003cdiv>\n\u003cdiv>\n\u003cdiv>\n\u003cdiv>As leaders, we are constantly balancing risk and opportunity. Many leaders naturally default to \u003cstrong>playing not to lose\u003c/strong>&mdash;focusing on avoiding mistakes and protecting what already exists.\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>Org
